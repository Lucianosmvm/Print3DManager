<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#6B4FBB"/>

  <!-- Printer body -->
  <rect x="120" y="200" width="272" height="160" rx="18" fill="#fff" opacity="0.95"/>

  <!-- Printer top slot -->
  <rect x="160" y="160" width="192" height="52" rx="12" fill="#EDE8F8"/>
  <rect x="160" y="160" width="192" height="52" rx="12" fill="none" stroke="#9B7FE8" stroke-width="6"/>

  <!-- Paper coming out top -->
  <rect x="210" y="100" width="92" height="80" rx="6" fill="#fff" opacity="0.9"/>
  <line x1="230" y1="125" x2="292" y2="125" stroke="#C5B8F0" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="145" x2="280" y2="145" stroke="#C5B8F0" stroke-width="6" stroke-linecap="round"/>

  <!-- Printer output tray -->
  <rect x="160" y="340" width="192" height="32" rx="8" fill="#EDE8F8"/>

  <!-- Printer details -->
  <circle cx="360" cy="280" r="14" fill="#9B7FE8"/>
  <circle cx="320" cy="280" r="14" fill="#C5B8F0"/>

  <!-- 3D cube accent bottom right -->
  <g transform="translate(340,360) scale(0.7)">
    <polygon points="40,0 80,20 80,60 40,80 0,60 0,20" fill="none" stroke="#fff" stroke-width="8" opacity="0.6"/>
    <line x1="40" y1="0" x2="40" y2="40" stroke="#fff" stroke-width="6" opacity="0.6"/>
    <line x1="0" y1="20" x2="40" y2="40" stroke="#fff" stroke-width="6" opacity="0.6"/>
    <line x1="80" y1="20" x2="40" y2="40" stroke="#fff" stroke-width="6" opacity="0.6"/>
  </g>
</svg>
